# electron/builder.yml
# AxiomPips Desktop — electron-builder configuration

appId: com.axiompips.desktop
productName: AxiomPips
copyright: "Copyright © 2025 AxiomPips"

directories:
  buildResources: electron/assets
  output: dist-electron

files:
  - electron/**
  - "!electron/assets/README.md"

# ── Windows ───────────────────────────────────────────────────────────────────
win:
  target:
    - target: nsis
  artifactName: "AxiomPips-Setup-${version}.${ext}"
  requestedExecutionLevel: asInvoker
  signingHashAlgorithms: null
  sign: null

# ── NSIS Installer (beautiful dark theme) ─────────────────────────────────────
nsis:
  # Installer behavior
  oneClick: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  perMachine: false

  # Shortcuts
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: AxiomPips
  menuCategory: "AxiomPips"

  # Custom script for dark theme + reinstall detection
  include: electron/installer.nsh

  # Installer pages — clean and minimal
  installerLanguages:
    - English

  displayLanguageSelector: false

  # License (optional — comment out if you don't have one)
  # license: electron/assets/LICENSE.txt

  # Custom installer/uninstaller names
  uninstallDisplayName: "AxiomPips ${version}"

  # Beautiful dark theme installer images
  installerHeader: electron/assets/installerHeader.bmp
  installerSidebar: electron/assets/installerSidebar.bmp

  # Delete app data on uninstall prompt
  deleteAppDataOnUninstall: false

# ── Publishing — handled by GitHub Actions, not electron-builder ──────────────
publish: null

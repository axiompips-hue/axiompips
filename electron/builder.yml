appId: com.axiompips.desktop
productName: AxiomPips
copyright: "Copyright © 2025 AxiomPips"

directories:
  buildResources: electron/assets
  output: dist-electron

files:
  - electron/**
  - "!electron/assets/README.md"
  - "!electron/assets/generate-installer-images.py"

win:
  target:
    - target: nsis
  artifactName: "AxiomPips-Setup-${version}.${ext}"
  requestedExecutionLevel: asInvoker
  signingHashAlgorithms: null
  sign: null

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: AxiomPips
  menuCategory: "AxiomPips"
  include: electron/installer.nsh
  uninstallDisplayName: "AxiomPips ${version}"
  installerHeader: electron/assets/installerHeader.bmp
  installerSidebar: electron/assets/installerSidebar.bmp
  deleteAppDataOnUninstall: false

publish: null

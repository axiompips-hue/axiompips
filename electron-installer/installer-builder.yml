appId: com.axiompips.installer
productName: AxiomPips
copyright: "Copyright © 2025 AxiomPips"

directories:
  output: dist-installer

files:
  - "!dist-installer/**"
  - "!node_modules/**"
  - "**/*"

win:
  target:
    - target: nsis
  artifactName: "AxiomPips-Setup.exe"
  requestedExecutionLevel: asInvoker
  signingHashAlgorithms: null
  sign: null

nsis:
  oneClick: true
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: AxiomPips Installer

publish: null

name: Build AxiomPips Desktop

on:
  push:
    tags:
      - "v*"  # triggers on version tags like v0.1.0, v1.0.0

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Create .env.local
        run: |
          echo NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }} >> .env.local
          echo NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }} >> .env.local
        shell: bash

      - name: Build Next.js + Electron installer
        run: npm run electron:build:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer to release
        uses: softprops/action-gh-release@v2
        with:
          name: "AxiomPips ${{ github.ref_name }}"
          body: |
            ## AxiomPips Desktop ${{ github.ref_name }}
            
            ### Download
            - **Windows**: Download `AxiomPips-Setup.exe` below
            
            ### Installation
            1. Download `AxiomPips-Setup.exe`
            2. Run it
            3. Follow the installer
            4. Launch AxiomPips from your desktop
            
            ### Requirements
            - Windows 10 or later
            - Internet connection
          files: |
            dist-electron/*.exe
            dist-electron/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

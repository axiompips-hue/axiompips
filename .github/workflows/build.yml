name: Build AxiomPips Desktop

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Create .env.local
        run: |
          echo NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }} >> .env.local
          echo NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }} >> .env.local
          echo RESEND_API_KEY=${{ secrets.RESEND_API_KEY }} >> .env.local
        shell: bash

      - name: Build Next.js + Electron installer
        run: npm run electron:build:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          ELECTRON_BUILDER_PUBLISH: never

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "AxiomPips ${{ github.ref_name }}"
          body: |
            ## AxiomPips Desktop ${{ github.ref_name }}

            ### Download
            - **Windows Installer**: Download `AxiomPips-Setup-0.1.0.exe` below

            ### Installation
            1. Download `AxiomPips-Setup-0.1.0.exe`
            2. Run it
            3. Click More info -> Run anyway
            4. Follow the installer
            5. Launch AxiomPips from your desktop

            ### Requirements
            - Windows 10 or later
            - Internet connection
          files: dist-electron/AxiomPips-Setup-0.1.0.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
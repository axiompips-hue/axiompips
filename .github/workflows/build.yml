name: Build AxiomPips Desktop

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install main dependencies
        run: npm ci

      - name: Create .env.local
        run: |
          echo NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }} >> .env.local
          echo NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }} >> .env.local
          echo RESEND_API_KEY=${{ secrets.RESEND_API_KEY }} >> .env.local
        shell: bash

      - name: Install installer dependencies
        run: npm ci
        working-directory: electron-installer

      - name: Build beautiful custom installer
        run: npm run build:installer
        working-directory: electron-installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload installer to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "AxiomPips ${{ github.ref_name }}"
          body: |
            ## AxiomPips Desktop ${{ github.ref_name }}

            ### Download
            - **Windows**: Download `AxiomPips-Setup.exe` below

            ### Installation
            1. Download `AxiomPips-Setup.exe`
            2. Run it — beautiful installer opens
            3. Click Install AxiomPips
            4. Launch from your desktop

            ### Requirements
            - Windows 10 or later
            - Internet connection
          files: electron-installer/dist-installer/AxiomPips-Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
